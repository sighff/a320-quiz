<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A320 Quiz">
<meta name="theme-color" content="#0a1520">
<title>A320 Technical Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a1520;
    color: #cde4f5;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 20px 16px 48px;
    max-width: 720px;
    margin: 0 auto;
  }
  #home-screen { padding-top: 32px; }
  .home-header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .home-title { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #cde4f5; }
  .home-sub { font-size: 10px; letter-spacing: 4px; color: #3a7ca5; margin-bottom: 32px; }
  .sys-list { display: flex; flex-direction: column; gap: 12px; }
  .sys-card {
    display: flex; justify-content: space-between; align-items: center;
    background: #0e1f30; border: 1px solid #1e3347; border-radius: 8px;
    padding: 18px 20px; cursor: pointer; text-align: left; width: 100%;
    font-family: 'Courier New', monospace; transition: border-color 0.15s, background 0.15s;
    color: #cde4f5;
  }
  .sys-card:hover { border-color: #0077cc; background: #0d2035; }
  .sys-card-left { display: flex; flex-direction: column; gap: 4px; }
  .sys-name { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #e8f4ff; }
  .sys-sub { font-size: 10px; letter-spacing: 1px; color: #4a6070; }
  .sys-count {
    background: #162a3e; border: 1px solid #1e3347; border-radius: 4px;
    padding: 5px 10px; font-size: 11px; font-weight: 700; color: #64b5f6; letter-spacing: 1px; white-space: nowrap;
  }
  .home-footer { font-size: 10px; color: #2a4055; letter-spacing: 1px; margin-top: 40px; text-align: center; }
  #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  #header-left { display: flex; align-items: center; gap: 10px; }
  .badge { background: #0077cc; color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 3px 8px; border-radius: 3px; }
  #sys-label { font-size: 11px; letter-spacing: 3px; color: #64b5f6; }
  #q-counter { font-size: 14px; color: #4a6070; }
  #home-btn {
    background: none; border: 1px solid #1e3347; border-radius: 4px;
    color: #3a7ca5; font-size: 10px; font-family: 'Courier New', monospace;
    letter-spacing: 1px; padding: 4px 8px; cursor: pointer;
  }
  #home-btn:hover { border-color: #3a7ca5; color: #64b5f6; }
  #progress-bg { height: 3px; background: #162030; border-radius: 2px; margin-bottom: 26px; overflow: hidden; }
  #progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #0077cc, #00c6ff); transition: width 0.4s ease; width: 0%; }
  #q-num { font-size: 11px; letter-spacing: 3px; color: #3a7ca5; margin-bottom: 10px; }
  #q-text { font-size: 16px; line-height: 1.6; color: #e8f4ff; margin-bottom: 22px; font-weight: 600; }
  #options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px; background: #0e1f30;
    border: 1px solid #1e3347; border-radius: 6px; padding: 12px 14px; cursor: pointer;
    text-align: left; color: #9cb4cc; width: 100%; font-family: 'Courier New', monospace;
    font-size: 14px; line-height: 1.5; transition: border-color 0.15s, background 0.15s;
  }
  .opt-btn:active { opacity: 0.8; }
  .opt-btn.selected { border-color: #64b5f6; background: #0d2035; color: #cde4f5; }
  .opt-btn.correct  { border-color: #00e5b0; background: #0a2318; color: #cde4f5; }
  .opt-btn.wrong    { border-color: #ff5c5c; background: #200f0f; color: #cde4f5; }
  .opt-btn.dimmed   { opacity: 0.4; }
  .opt-label {
    min-width: 22px; height: 22px; border: 1px solid #2a4055; border-radius: 3px;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    font-weight: 700; color: #4a6070; flex-shrink: 0; margin-top: 1px;
  }
  .opt-btn.selected .opt-label { color: #64b5f6; border-color: #64b5f6; }
  .opt-btn.correct  .opt-label { color: #00e5b0; border-color: #00e5b0; }
  .opt-btn.wrong    .opt-label { color: #ff5c5c; border-color: #ff5c5c; }
  #explanation {
    background: #0b1e2d; border: 1px solid #1e4060; border-left: 3px solid #0077cc;
    border-radius: 6px; padding: 14px 16px; margin-bottom: 20px; display: none;
  }
  #expl-header { font-size: 10px; letter-spacing: 3px; margin-bottom: 8px; font-weight: 700; }
  #expl-body   { font-size: 13px; line-height: 1.65; color: #9cb4cc; }
  #actions { display: flex; justify-content: flex-end; margin-top: 8px; }
  .btn-primary {
    background: #0077cc; color: #fff; border: none; border-radius: 5px;
    padding: 12px 28px; font-size: 12px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; font-family: 'Courier New', monospace;
  }
  .btn-primary:disabled { opacity: 0.3; cursor: default; }
  #finish-screen { display: none; text-align: center; padding: 60px 20px; }
  #finish-label { font-size: 12px; letter-spacing: 4px; color: #64b5f6; margin-bottom: 10px; }
  #finish-sys { font-size: 10px; letter-spacing: 3px; color: #3a7ca5; margin-bottom: 24px; }
  #finish-total { font-size: 48px; font-weight: 900; line-height: 1; font-family: monospace; color: #00e5b0; margin-bottom: 12px; }
  #finish-detail { font-size: 15px; color: #9cb4cc; margin-bottom: 32px; }
  .finish-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-sec {
    background: #0e1f30; color: #64b5f6; border: 1px solid #1e3347; border-radius: 5px;
    padding: 12px 28px; font-size: 12px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; font-family: 'Courier New', monospace;
  }
  /* ── NOTES ── */
  #notes-section { margin-top: 14px; }
  .notes-label { font-size: 9px; letter-spacing: 3px; color: #3a7ca5; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .notes-label span { color: #1e4060; }
  #notes-ta {
    width: 100%; min-height: 72px; background: #060f18; border: 1px solid #1a3550;
    border-radius: 4px; color: #9cb4cc; font-family: 'Courier New', monospace;
    font-size: 13px; padding: 10px 12px; resize: vertical; outline: none; line-height: 1.6;
  }
  #notes-ta:focus { border-color: #0077cc; color: #cde4f5; }
  #notes-ta::placeholder { color: #1e3347; }
  #notes-saved { font-size: 9px; letter-spacing: 2px; color: #0077cc; opacity: 0; transition: opacity 0.4s; margin-left: 6px; }
  /* ── ADD QUESTION SCREEN ── */
  #addq-screen { display: none; padding-top: 32px; }
  .addq-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .addq-title { font-size: 12px; letter-spacing: 3px; color: #64b5f6; font-weight: 700; }
  .field-label { font-size: 9px; letter-spacing: 3px; color: #3a7ca5; margin-bottom: 6px; display: block; }
  .field-group { margin-bottom: 18px; }
  .addq-select, .addq-input, .addq-textarea {
    width: 100%; background: #060f18; border: 1px solid #1a3550; border-radius: 4px;
    color: #cde4f5; font-family: 'Courier New', monospace; font-size: 13px;
    padding: 10px 12px; outline: none;
  }
  .addq-select:focus, .addq-input:focus, .addq-textarea:focus { border-color: #0077cc; }
  .addq-textarea { min-height: 80px; resize: vertical; line-height: 1.6; }
  .opt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .opt-radio { accent-color: #0077cc; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
  .opt-correct-label { font-size: 9px; letter-spacing: 1px; color: #3a7ca5; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
  .opt-remove { background: none; border: 1px solid #2a3040; border-radius: 3px; color: #4a6070;
    font-size: 11px; cursor: pointer; padding: 2px 7px; font-family: 'Courier New', monospace; }
  .opt-remove:hover { border-color: #ff5c5c; color: #ff5c5c; }
  .addq-add-opt { background: none; border: 1px dashed #1e4060; border-radius: 4px; color: #3a7ca5;
    font-size: 11px; letter-spacing: 1px; cursor: pointer; padding: 7px; width: 100%;
    font-family: 'Courier New', monospace; margin-bottom: 18px; }
  .addq-add-opt:hover { border-color: #0077cc; color: #64b5f6; }
  .addq-btns { display: flex; gap: 10px; justify-content: flex-end; }
  /* custom question list on home */
  .custom-q-list { margin-top: 8px; }
  .custom-q-item { display: flex; justify-content: space-between; align-items: flex-start;
    background: #0a1a28; border: 1px solid #1a3040; border-radius: 5px; padding: 10px 12px;
    margin-bottom: 6px; font-size: 12px; gap: 10px; }
  .custom-q-text { color: #9cb4cc; flex: 1; line-height: 1.5; }
  .custom-q-sys { font-size: 9px; letter-spacing: 2px; color: #3a7ca5; margin-top: 3px; }
  .btn-del { background: none; border: 1px solid #2a3040; border-radius: 3px; color: #4a6070;
    font-size: 10px; cursor: pointer; padding: 3px 8px; font-family: 'Courier New', monospace;
    white-space: nowrap; }
  .btn-del:hover { border-color: #ff5c5c; color: #ff5c5c; }
  .btn-edit { background: none; border: 1px solid #1e4060; border-radius: 3px; color: #3a7ca5;
    font-size: 10px; cursor: pointer; padding: 3px 8px; font-family: 'Courier New', monospace;
    white-space: nowrap; }
  .btn-edit:hover { border-color: #0077cc; color: #64b5f6; }
  .custom-q-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .btn-edit-q {
    background: none; border: 1px solid #1e4060; border-radius: 5px; color: #3a7ca5;
    font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 10px 16px;
    cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.15s;
  }
  .btn-edit-q:hover { border-color: #0077cc; color: #64b5f6; background: #091522; }
  .add-q-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: none; border: 1px dashed #1e4060; border-radius: 8px; padding: 14px 20px;
    cursor: pointer; width: 100%; font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 2px; color: #3a7ca5; transition: all 0.15s; margin-top: 4px;
  }
  .add-q-btn:hover { border-color: #0077cc; color: #64b5f6; background: #091522; }
</style>
</head>
<body>

<div id="home-screen">
  <div class="home-header">
    <span class="badge">A320</span>
    <span class="home-title">TECHNICAL QUIZ</span>
  </div>
  <div class="home-sub">SELECT SYSTEM</div>
  <div class="sys-list">
    <button class="sys-card" onclick="startQuiz(0)">
      <div class="sys-card-left">
        <span class="sys-name">AUTOFLIGHT</span>
        <span class="sys-sub">FMGC · FMS · FLIGHT CONTROLS LAW</span>
      </div>
      <span class="sys-count">41 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(1)">
      <div class="sys-card-left">
        <span class="sys-name">AIR COND / PRESS / VENT</span>
        <span class="sys-sub">PACKS · PRESSURIZATION · AVIONICS COOLING</span>
      </div>
      <span class="sys-count">108 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(2)">
      <div class="sys-card-left">
        <span class="sys-name">DOORS</span>
        <span class="sys-sub">PASSENGER · CARGO · COCKPIT · SLIDES</span>
      </div>
      <span class="sys-count">17 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(3)">
      <div class="sys-card-left">
        <span class="sys-name">INDICATING / RECORDING</span>
        <span class="sys-sub">ECAM · PFD · ND · DMC · FMA</span>
      </div>
      <span class="sys-count">51 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(4)">
      <div class="sys-card-left">
        <span class="sys-name">ELECTRICAL</span>
        <span class="sys-sub">IDG · BUSES · RAT · BATTERIES · EMERGENCY</span>
      </div>
      <span class="sys-count">73 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(5)">
      <div class="sys-card-left">
        <span class="sys-name">PNEUMATICS</span>
        <span class="sys-sub">BLEED · BMC · X-BLEED · PRESSURIZATION</span>
      </div>
      <span class="sys-count">45 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(6)">
      <div class="sys-card-left">
        <span class="sys-name">FUEL</span>
        <span class="sys-sub">TANKS · PUMPS · TRANSFER · CROSSFEED</span>
      </div>
      <span class="sys-count">27 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(7)">
      <div class="sys-card-left">
        <span class="sys-name">ICE & RAIN PROTECTION</span>
        <span class="sys-sub">WING A/I · ENG A/I · PROBES · WIPERS</span>
      </div>
      <span class="sys-count">38 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(8)">
      <div class="sys-card-left">
        <span class="sys-name">HYDRAULIC SYSTEM</span>
        <span class="sys-sub">GREEN · BLUE · YELLOW · PTU · RAT</span>
      </div>
      <span class="sys-count">46 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(9)">
      <div class="sys-card-left">
        <span class="sys-name">APU</span>
        <span class="sys-sub">ECB · START · BLEED · FIRE · LIMITS</span>
      </div>
      <span class="sys-count">35 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(10)">
      <div class="sys-card-left">
        <span class="sys-name">ENGINES</span>
        <span class="sys-sub">FADEC · A/THR · FMA · ALPHA FLOOR · START</span>
      </div>
      <span class="sys-count">63 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(11)">
      <div class="sys-card-left">
        <span class="sys-name">LANDING GEAR</span>
        <span class="sys-sub">BRAKES · STEERING · GRAVITY EXT · ANTI-SKID</span>
      </div>
      <span class="sys-count">67 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(12)">
      <div class="sys-card-left">
        <span class="sys-name">OXYGEN</span>
        <span class="sys-sub">CREW · PAX GENERATORS · MASKS · SUPPLY</span>
      </div>
      <span class="sys-count">12 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(13)">
      <div class="sys-card-left">
        <span class="sys-name">EQUIPMENT</span>
        <span class="sys-sub">SLIDES · PBE · EMERGENCY LIGHTS · EXITS</span>
      </div>
      <span class="sys-count">12 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(14)">
      <div class="sys-card-left">
        <span class="sys-name">COMMUNICATION</span>
        <span class="sys-sub">VHF · RMP · ACP · CVR · INTERPHONE</span>
      </div>
      <span class="sys-count">53 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(15)">
      <div class="sys-card-left">
        <span class="sys-name">FLIGHT CONTROLS</span>
        <span class="sys-sub">ELAC · SEC · FAC · LAWS · SPOILERS · THS</span>
      </div>
      <span class="sys-count">78 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(16)">
      <div class="sys-card-left">
        <span class="sys-name">NAVIGATION</span>
        <span class="sys-sub">FMGS · ADIRS · FCU · MCDU · AP · FMA</span>
      </div>
      <span class="sys-count">66 Q</span>
    </button>
    <button class="sys-card" onclick="startQuiz(17)">
      <div class="sys-card-left">
        <span class="sys-name">FIRE PROTECTION</span>
        <span class="sys-sub">LOOPS · ENG · APU · CARGO · AVIONICS</span>
      </div>
      <span class="sys-count">46 Q</span>
    </button>
  </div>
  <div class="home-footer">TheAirlinePilots.com · Last Updated Jul 2025</div>
  <button class="add-q-btn" onclick="goAddQ()">✎ ADD YOUR OWN QUESTION</button>
  <div id="custom-q-section"></div>
</div>

<div id="quiz-screen" style="display:none">
  <div id="header">
    <div id="header-left">
      <span class="badge">A320</span>
      <span id="sys-label"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="q-counter"></span>
      <button id="home-btn" onclick="goHome()">⌂ MENU</button>
    </div>
  </div>
  <div id="progress-bg"><div id="progress-fill"></div></div>
  <div id="q-num"></div>
  <div id="q-text"></div>
  <div id="options"></div>
  <div id="explanation">
    <div id="expl-header"></div>
    <div id="expl-body"></div>
    <div id="notes-section" style="display:none; margin-top:14px; border-top:1px solid #1a3550; padding-top:12px;">
      <div class="notes-label">✎ MY NOTES <span id="notes-saved">SAVED</span></div>
      <textarea id="notes-ta" placeholder="Add your own study notes for this question…" oninput="saveNote()"></textarea>
    </div>
  </div>
  <div id="actions" style="display:flex; justify-content:space-between; align-items:center; margin-top:8px; gap:10px;">
    <button class="btn-edit-q" id="edit-q-btn" onclick="openEditCurrentQ()" style="display:none;">✎ EDIT QUESTION</button>
    <button class="btn-primary" id="action-btn" onclick="handleAction()" style="margin-left:auto;">CONFIRM</button>
  </div>
</div>

<div id="finish-screen">
  <div id="finish-label">SESSION COMPLETE</div>
  <div id="finish-sys"></div>
  <div id="finish-total"></div>
  <div id="finish-detail"></div>
  <div class="finish-btns">
    <button class="btn-sec" onclick="goHome()">⌂ MENU</button>
    <button class="btn-primary" onclick="restart()">NEW SESSION</button>
  </div>
</div>

<!-- ── ADD / EDIT QUESTION SCREEN ── -->
<div id="addq-screen">
  <div class="addq-header">
    <span class="addq-title" id="addq-title">+ ADD QUESTION</span>
    <button id="home-btn" onclick="goHome()">⌂ MENU</button>
  </div>
  <div class="field-group">
    <label class="field-label">SYSTEM</label>
    <select id="aq-sys" class="addq-select"></select>
  </div>
  <div class="field-group">
    <label class="field-label">QUESTION</label>
    <textarea id="aq-q" class="addq-textarea" placeholder="Enter question text…"></textarea>
  </div>
  <div class="field-group">
    <label class="field-label">ANSWER OPTIONS  (select ● correct)</label>
    <div id="aq-opts"></div>
    <button class="addq-add-opt" onclick="addOptRow()">+ ADD OPTION</button>
  </div>
  <div class="addq-btns">
    <button class="btn-sec" onclick="goHome()">CANCEL</button>
    <button class="btn-primary" onclick="saveCustomQ()">SAVE QUESTION</button>
  </div>
</div>

<script>
const autoflightQ = [
  { id:1,  q:"The Flight Management part of the FMGC includes the following elements:", opts:["Navigation, flight planning and A/THR commands.","Performance optimization, A/THR and AP commands","Navigation, flight planning, performance optimization and flight predictions","AP and FD commands and flight envelope computation."], correct:2 },
  { id:2,  q:"How can the present position of the aircraft be initialized?", opts:["Present position can be entered through the ADIRS CDU.","Present position can be entered on the INIT page of the MCDU.","Both are correct."], correct:2 },
  { id:3,  q:"What are the correct positions for the PFD and ND?", opts:["The PFD should be outboard and the ND should be inboard.","The PFD should be inboard and the ND should be outboard.","The PFD should be to the left of the ND for both seat positions.","The PFD should be inboard and the ND should be inboard."], correct:0 },
  { id:4,  q:"What information is supplied by the IRs and displayed on the PFD?", opts:["Heading, attitude, and vertical speed.","Heading, altitude, and vertical speed.","Airspeed, altitude, and backup vertical speed.","Heading, attitude, and altitude."], correct:0 },
  { id:5,  q:"How long does a normal IR alignment take?", opts:["Approximately 3 minutes.","Approximately 6 minutes.","Approximately 10 minutes.","Approximately 13 minutes."], correct:2 },
  { id:6,  q:"The IR ALIGN light is extinguished. What does this mean?", opts:["Alignment has been completed.","Air data output has been disconnected.","The respective IR is operating normally."], correct:0 },
  { id:7,  q:"An amber FLASHING IR FAULT light indicates that:", opts:["Present position needs to be re-entered.","Attitude and heading information may be recovered in ATT mode.","A complete failure of the respective IR has occurred."], correct:1 },
  { id:8,  q:"What action should be taken if IR #2 is lost?", opts:["Move the EIS DMC rotary selector knob to F/O 3.","Move the ATT HDG rotary selector knob to CAPT 3.","Move the ATT HDG rotary selector knob to F/O 3.","Move the ATT HDG rotary selector knob to F/O 1."], correct:2 },
  { id:9,  q:"A/THR displayed in white on the FMA means A/THR is:", opts:["Disconnected.","Armed.","Active."], correct:2 },
  { id:10, q:"The white IR ALIGN light is flashing. What does this mean?", opts:["No present position entered and 10 minutes has elapsed since IR selected ON.","No present position entered and 10 minutes elapsed since IR selected ON. An alignment fault may exist.","Attitude and heading information have been lost. An alignment fault may exist."], correct:1 },
  { id:11, q:"What message is displayed if the database effective date does not match the clock date?", opts:["Check Data Base Cycle.","Check Data Base Date.","Check Effective Date.","Check the changeover date."], correct:0 },
  { id:12, q:"Placing one of the ADR push buttons OFF will accomplish what?", opts:["The OFF light illuminates and air data output disconnects.","The respective ADIRU becomes de-energized.","Both AD and IR information will be disconnected.","All of the above."], correct:0 },

  { id:21, q:"If the thrust levers are set in the idle detent, is Alpha floor protection still available?", opts:["Yes, thrust lever position is disregarded.","Yes, as long as 'A/THR' appears in Column five.","No, because the IDLE detent is out of the A/THR active range."], correct:0 },
  { id:22, q:"Is there any mechanical linkage between the thrust levers and the engines?", opts:["There is a fiber optic backup.","There is a mechanical linkage in case the ECU fails.","No, it is electrically powered and hydraulically actuated.","No, it is totally electrical."], correct:3 },
  { id:23, q:"What is Alpha floor protection?", opts:["It helps prevent the aircraft from stalling and protects against windshear encounters during takeoff and approach.","It is a function of the flight control laws to prevent the aircraft from stalling.","It helps prevent the aircraft from stalling by limiting the angle of bank at low airspeeds.","It helps prevent the aircraft from stalling by limiting the angle of climb at high airspeeds."], correct:0 },
  { id:24, q:"Alpha floor protection is available:", opts:["From lift off and down to 100 feet radio altitude in the landing configuration.","From lift off and down to 50 feet radio altitude in the landing configuration.","From lift off and down to 500 feet radio altitude in the landing configuration.","From lift off and down to 750 feet radio altitude in the landing configuration."], correct:0 },
  { id:25, q:"How do you arm the A/THR in flight?", opts:["A/THR switch ON when throttles are in the engagement mode.","A/THR switch ON when throttles are not in the engagement mode."], correct:1 },
  { id:26, q:"What is the difference between variable thrust and the speed mode?", opts:["In the fixed thrust mode, thrust is fixed and the elevator controls the speed.","In the variable thrust mode, thrust is fixed and speed is controlled by the elevator.","In the fixed thrust mode, thrust is variable and speed is controlled by the elevator."], correct:0 },
  { id:27, q:"The left column, first line of the FMA is used to indicate:", opts:["If A/THR is off, armed, or active.","The mode of the A/THR in use when A/THR is armed or active.","Amber caution messages.","The thrust indication."], correct:1 },
  { id:28, q:"What are the two basic modes of the A/THR system?", opts:["Thrust and Mach.","Thrust and speed.","Variable thrust and fixed speed.","Mach and speed."], correct:2 },
  { id:29, q:"Can the engines be overboosted in the TOGA position?", opts:["Yes, if the autothrust function is not active.","No, because the ECU provides engine protection limit by monitoring N1, N2, and HMU fuel flow adjustments.","No, because the EIU is responsible for monitoring N1 and N2."], correct:1 },
  { id:30, q:"During a manual start, how is the start valve opened?", opts:["It is automatic once the ENG MASTER is placed to the ON position.","By depressing the ENG MAN START pushbutton on the overhead panel.","By depressing the ENG MAN START pushbutton on the overhead panel while the ENG MODE selector is out of the NORM position."], correct:2 },
  { id:31, q:"Is any thrust lever action required if an engine failed at rotation while using FLEX takeoff power?", opts:["Yes.","No."], correct:0 },
  { id:32, q:"When does oil quantity indication begin to pulse?", opts:["Decreasing below 5 qts.","During engine start.","Oil quantity detector or pressure fault."], correct:0 },
  { id:33, q:"Does the FADEC provide EGT limit protection constantly?", opts:["Yes, in all phases of flight.","No, EGT limit protection is only available during ground auto starts.","No, EGT limit protection is only available during ground auto starts and single-engine operations."], correct:1 },
  { id:34, q:"Auto Thrust System: When are the throttles in the engagement range?", opts:["Both throttles are above idle but not above the CLB detent when both engines are running.","A single throttle of an operating engine is above idle but not above the MCT detent when one engine is running.","All of the above."], correct:2 },
  { id:35, q:"During descent, what might cause the IDLE N1 setting to increase?", opts:["The slats are extended.","For a higher than normal bleed air demand or warmer than normal engine oil temp in flight.","Both are correct."], correct:2 },
  { id:36, q:"Verification that Autothrust (A/THR) is active can be made by:", opts:["Watching the automatic movement of the thrust levers.","Only when the thrust levers are set at TOGA.","Only by looking at column five of the FMA."], correct:2 },
  { id:37, q:"When Alpha floor is activated, what power setting is automatically commanded and what FMA annunciation would appear in Column one?", opts:["TOGA / A. FLOOR","CLB / CLB","MCT / THR LK","THR / LK"], correct:0 },
  { id:38, q:"Holding the instinctive disconnect push buttons for more than fifteen seconds will:", opts:["Disengage the A/THR (including Alpha Floor) until below 1000 feet AGL for the remainder of the flight.","Disengage the A/THR (including Alpha Floor) until below 500 feet AGL for the remainder of the flight.","Disengage the A/THR (excluding Alpha Floor) for the remainder of the flight.","Disengage the A/THR (including Alpha Floor) for the remainder of the flight."], correct:3 },
  { id:39, q:"During the automatic start sequence of ENG 2, you notice that only igniter B is powered. Is it normal?", opts:["Yes, igniter A is only used for engine anti-ice.","No, normally both igniters are used for all engine starts.","Yes, igniter B is always used for ENG 2 start.","Yes, igniters are used alternately for engine start."], correct:3 },
  { id:40, q:"As far as FMA annunciations are concerned, what would indicate that the A/THR system is active?", opts:["'SPEED' appears in green in column one, line one.","'A/THR' changes from blue to white as shown in column five, line three.","'A/THR' changes from white to blue in column five, line one.","'SPEED' appears in amber in column one, line one."], correct:1 },
  { id:41, q:"If a thrust lever is set between two detents, the FADEC selects the rating limit corresponding to the higher limit.", opts:["True. This limit is displayed on the upper ECAM.","False. For safety reasons, it always selects the rating limit corresponding to the lower limit."], correct:0 },
  { id:42, q:"What would happen during the takeoff roll if the thrust levers were set to the FLX/MCT detent without FLEX temperature being entered?", opts:["Nothing, the thrust setting would be at FLEX since FADEC automatically calculates a reduced thrust setting.","The thrust setting would be MCT and there would be no corresponding warnings.","A LEVEL TWO warning would sound along with the appearance of an ECAM message."], correct:2 },
  { id:43, q:"What abnormals would cause the FADEC to automatically abort a start?", opts:["A hot start, an overtemp, a stalled start or no lightoff.","An engine overspeed.","A hot start, a stalled start, an overtemp or APU underspeed.","A hot start, an overtemp or an engine overspeed."], correct:0 },
  { id:44, q:"During an in-flight start or a manual start, will the FADEC auto abort for an abnormal?", opts:["Yes. It will for an in-flight start (but not for a manual start).","Yes.","No."], correct:2 },
  { id:45, q:"For reverser actuation, the left engine uses ____ hydraulic system pressure and the right engine uses _____ hydraulic system pressure.", opts:["Green - Yellow.","Yellow - Blue.","Yellow - Green.","Blue - Green."], correct:0 },
  { id:46, q:"While flying with A/THR active, the speed knob is pulled and turned to a speed slower than Alpha prot. What speed will the airplane slow to?", opts:["VLS.","Green Dot + 5 kts.","Green dot.","Green dot + 10 kts."], correct:0 },
  { id:47, q:"Where is the thrust reduction altitude found and is the number always the same?", opts:["Column four, row three of the FMA. It will always be 1500 ft. AGL.","TAKE OFF PERF page of the MCDU (it can be modified).","PROG page of the MCDU. It can be modified in order to meet constraints.","TAKE OFF PERF page of the MCDU. It cannot be modified."], correct:1 },
  { id:48, q:"During a manual start, what function does the FADEC perform?", opts:["Passive monitoring of the start sequence, to close the start valve and cut off the ignition on the ground.","To control the start sequence and take corrective action in case of a failure or malfunction.","The FADEC does not perform any function during a manual start."], correct:0 },
  { id:49, q:"During normal operation, in what detent are the thrust levers positioned once the thrust reduction altitude has been reached?", opts:["CL","MCT","FLX","CRZ"], correct:0 },
  { id:50, q:"After takeoff the A/THR will not become active until:", opts:["The thrust levers are placed in the CLIMB position.","The thrust levers are moved out of the TO/GA or FLEX/MCT detents.","The autopilot is engaged.","The A/THR pushbutton is manually selected ON."], correct:0 },
  { id:51, q:"Continuous ignition is provided automatically when:", opts:["ENG ANTI ICE is selected ON and/or engine flameout is detected in flight.","ENG ANTI ICE is selected ON.","ENG ANTI ICE is selected ON and/or engine flameout is detected in flight and/or the EIU fails."], correct:2 },
  { id:53, q:"The FADEC will automatically abort an abnormal start. Will the FADEC also automatically dry crank the engine?", opts:["No, that is why there is a CRANK selection on the ENG MODE selector.","Yes, even if the crew interrupts the start by placing the ENG MASTER switch to OFF.","Yes, as long as the ENG MASTER switch remains in the ON position."], correct:2 },
  { id:54, q:"What would happen in flight if the FADEC's alternator failed?", opts:["Automatic control of the engine would be lost.","The standby channel of the ECU would take over.","The FADEC would now be powered using ship's power.","The FADEC would now be powered using ship's battery power."], correct:2 },
  { id:55, q:"In the middle of a manual engine start, what are you looking for when you select ENG MASTER 2 ON?", opts:["The fuel used is reset, fuel flow is indicated and IGNITION message on the E/WD.","The fuel flow is reset, an igniter is powered and fuel used is indicated.","The fuel used is reset, both igniters are powered and fuel flow is indicated.","The fuel used is reset, both igniters are powered and N2 is increasing."], correct:2 },
  { id:56, q:"Each FADEC is a dual channel (A&B) computer providing full engine management.", opts:["True.","False."], correct:0 },
  { id:57, q:"In addition to when the engine is operating, when else will the FADEC be powered?", opts:["When the FADEC GND PWR pb on the maintenance panel is depressed, or the ENG MASTER switch is placed to ON.","When the FADEC control switch is placed to the IGN/START position.","For five minutes after electrical power is applied to the aircraft, when the FADEC GND PWR pb on the maintenance panel is depressed, or when the ENG MODE control switch is placed to IGN/START position.","As long as electrical power is established on the aircraft, the FADEC is powered."], correct:2 },
  { id:58, q:"During an automatic start, the FADEC controls:", opts:["The start valves, igniters and fuel flow.","The start valves, igniters, HP and LP fuel valves.","The igniters and fuel flow.","The start valves, igniters, HP and LP fuel valves, and fuel flow."], correct:3 },
  { id:59, q:"How is manual arming of the A/THR system accomplished?", opts:["By pressing the A/THR pb on the FCU; confirm the pushbutton illuminates green or confirm an A/THR annunciation is displayed in column 5 of the FMA.","By placing the thrust levers into the active range.","Advance at least one thrust lever to the TOGA or FLX/MCT detent with at least one Flight Director (FD) on."], correct:0 },
  { id:60, q:"You are at the start of a descent and a blue N1 arc is displayed showing the new thrust demand. When does this happen?", opts:["Whenever the thrust levers are moved out of the CLIMB position.","Whenever there is a power change in manual thrust.","Whenever there is a power change with the autopilot engaged.","Whenever there is a power change with auto thrust engaged."], correct:3 },
  { id:61, q:"A few seconds after selecting reverse, the amber REV indication changes to green. What does this mean?", opts:["The reversers have been re-stowed.","The reversers are now fully deployed.","The reverse thrust selection has been acknowledged.","The reversers are unlocked."], correct:1 },
  { id:62, q:"During engine start the amber FAULT light on the ENG MASTER panel illuminates. This indicates:", opts:["A failure in the automatic start sequence.","A failure of the ENG MODE SELECTOR.","A failure in the engine fire extinguishing system."], correct:0 },
  { id:63, q:"Which steps of a manual start are being taken care of by the FADEC?", opts:["Starter valve closure and ignition cut off.","Starter valve opening and ignition start.","Starter valve closure and ignition start.","Starter valve opening and ignition cut off."], correct:0 },
  { id:64, q:"Can Alpha-floor be disengaged while in Alpha Protection?", opts:["Yes, by manually disengaging the auto throttles.","No, the system is designed to avoid such a disengagement.","Yes, by reducing at idle one of the throttles (for more than 5 seconds)."], correct:0 }
];

  { id:20, q:"Auto brake may be armed with the parking brake on.", opts:["True.","False."], correct:0 },

const LABELS = ["A","B","C","D","E","F"];

// ─── localStorage helpers ─────────────────────────────────────────────────
function getCustomQuestions() {
  try { return JSON.parse(localStorage.getItem('a320_custom_q') || '[]'); } catch(e) { return []; }
}
function setCustomQuestions(arr) { localStorage.setItem('a320_custom_q', JSON.stringify(arr)); }

// Built-in question overrides: keyed by "sysIdx_qId"
function getOverrides() {
  try { return JSON.parse(localStorage.getItem('a320_overrides') || '{}'); } catch(e) { return {}; }
}
function setOverrides(obj) { localStorage.setItem('a320_overrides', JSON.stringify(obj)); }
function applyOverrides(qs, si) {
  const ov = getOverrides();
  return qs.map(q => {
    const key = si + '_' + q.id;
    return ov[key] ? { ...q, ...ov[key] } : q;
  });
}

// ─── NOTES ────────────────────────────────────────────────────────────────
let noteSaveTimer = null;
function saveNote() {
  const q   = getQ();
  const key = 'a320_note_' + (q._sysIdx !== undefined ? q._sysIdx : sysIdx) + '_' + q.id;
  localStorage.setItem(key, document.getElementById('notes-ta').value);
  const el = document.getElementById('notes-saved');
  el.style.opacity = '1';
  clearTimeout(noteSaveTimer);
  noteSaveTimer = setTimeout(() => { el.style.opacity = '0'; }, 1400);
}
function loadNote(q) {
  const key = 'a320_note_' + (q._sysIdx !== undefined ? q._sysIdx : sysIdx) + '_' + q.id;
  return localStorage.getItem(key) || '';
}

// ─── ADD / EDIT QUESTION UI ───────────────────────────────────────────────
let editingId   = null;  // null=add, number=custom q id, 'builtin'=built-in override
let editingBuiltinKey = null; // "sysIdx_qId" for built-in edits

function openEditCurrentQ() {
  const q = getQ();
  if (q._custom) {
    editCustomQ(q.id);
  } else {
    // built-in question edit
    editingId = 'builtin';
    editingBuiltinKey = sysIdx + '_' + q.id;
    hideAll();
    document.getElementById('addq-screen').style.display = 'block';
    document.getElementById('addq-title').textContent = '✎ EDIT QUESTION';

    const sel = document.getElementById('aq-sys');
    sel.innerHTML = SYSTEMS.map((s,i) => `<option value="${i}">${s.label}</option>`).join('');
    sel.value = sysIdx;
    sel.disabled = true; // can't move built-in to another system

    document.getElementById('aq-q').value = q.q;
    const c = document.getElementById('aq-opts');
    c.innerHTML = '';
    q.opts.forEach((opt, i) => {
      addOptRow();
      c.children[i].querySelector('.aq-opt-text').value = opt;
      if (i === q.correct) c.children[i].querySelector('input[type=radio]').checked = true;
    });
  }
}

function goAddQ() {
  editingId = null; editingBuiltinKey = null;
  hideAll();
  document.getElementById('addq-screen').style.display = 'block';
  document.getElementById('addq-title').textContent = '+ ADD QUESTION';
  const sel = document.getElementById('aq-sys');
  sel.innerHTML = SYSTEMS.map((s,i) => `<option value="${i}">${s.label}</option>`).join('');
  sel.disabled = false;
  document.getElementById('aq-q').value = '';
  document.getElementById('aq-opts').innerHTML = '';
  addOptRow(); addOptRow();
}

function editCustomQ(id) {
  const q = getCustomQuestions().find(q => q.id === id);
  if (!q) return;
  editingId = id; editingBuiltinKey = null;
  hideAll();
  document.getElementById('addq-screen').style.display = 'block';
  document.getElementById('addq-title').textContent = '✎ EDIT QUESTION';
  const sel = document.getElementById('aq-sys');
  sel.innerHTML = SYSTEMS.map((s,i) => `<option value="${i}">${s.label}</option>`).join('');
  sel.value = q._sysIdx;
  sel.disabled = false;
  document.getElementById('aq-q').value = q.q;
  const c = document.getElementById('aq-opts');
  c.innerHTML = '';
  q.opts.forEach((opt, i) => {
    addOptRow();
    c.children[i].querySelector('.aq-opt-text').value = opt;
    if (i === q.correct) c.children[i].querySelector('input[type=radio]').checked = true;
  });
}

function addOptRow() {
  const c = document.getElementById('aq-opts');
  const i = c.children.length;
  if (i >= 6) return;
  const row = document.createElement('div');
  row.className = 'opt-row';
  row.innerHTML = `
    <input type="radio" name="aq-correct" class="opt-radio" value="${i}" id="aq-r${i}">
    <label for="aq-r${i}" class="opt-correct-label">CORRECT</label>
    <input class="addq-input aq-opt-text" placeholder="Option ${String.fromCharCode(65+i)}…" style="flex:1">
    <button class="opt-remove" onclick="removeOptRow(this)">✕</button>`;
  c.appendChild(row);
}
function removeOptRow(btn) {
  const c = document.getElementById('aq-opts');
  if (c.children.length <= 2) return;
  btn.closest('.opt-row').remove();
  Array.from(c.children).forEach((row, i) => {
    const r = row.querySelector('input[type=radio]');
    const l = row.querySelector('label');
    const t = row.querySelector('.aq-opt-text');
    r.value = i; r.id = 'aq-r'+i; l.htmlFor = 'aq-r'+i;
    t.placeholder = 'Option ' + String.fromCharCode(65+i) + '…';
  });
}
function saveCustomQ() {
  const si    = parseInt(document.getElementById('aq-sys').value);
  const qText = document.getElementById('aq-q').value.trim();
  const rows  = document.getElementById('aq-opts').querySelectorAll('.opt-row');
  const opts  = Array.from(rows).map(r => r.querySelector('.aq-opt-text').value.trim());
  const radio = document.querySelector('input[name="aq-correct"]:checked');
  if (!qText)               { alert('Please enter a question.');       return; }
  if (opts.some(o => !o))   { alert('Please fill in all options.');     return; }
  if (!radio)               { alert('Please mark the correct answer.'); return; }
  const correct = parseInt(radio.value);
  document.getElementById('aq-sys').disabled = false; // re-enable before leaving

  if (editingId === 'builtin') {
    // save as override
    const ov = getOverrides();
    ov[editingBuiltinKey] = { q: qText, opts, correct };
    setOverrides(ov);
    goHome();
  } else if (editingId !== null) {
    // update existing custom
    let arr = getCustomQuestions();
    arr = arr.map(q => q.id === editingId ? { ...q, _sysIdx:si, q:qText, opts, correct } : q);
    setCustomQuestions(arr);
    renderHomeCustomSection();
    goHome();
  } else {
    // new custom question
    const arr = getCustomQuestions();
    arr.push({ _sysIdx:si, _custom:true, id:Date.now(), q:qText, opts, correct });
    setCustomQuestions(arr);
    renderHomeCustomSection();
    goHome();
  }
}
function deleteCustomQ(id) {
  if (!confirm('Delete this question?')) return;
  setCustomQuestions(getCustomQuestions().filter(q => q.id !== id));
  renderHomeCustomSection();
}

// ─── HOME CUSTOM SECTION ──────────────────────────────────────────────────
function renderHomeCustomSection() {
  const all = getCustomQuestions();
  const el  = document.getElementById('custom-q-section');
  if (!el) return;
  if (!all.length) { el.innerHTML = ''; return; }
  let html = `<div style="margin-top:28px">
    <div style="font-size:9px;letter-spacing:3px;color:#3a7ca5;margin-bottom:12px">MY QUESTIONS (${all.length})</div>
    <div class="custom-q-list">`;
  all.forEach(q => {
    const sysName = SYSTEMS[q._sysIdx] ? SYSTEMS[q._sysIdx].label : '?';
    html += `<div class="custom-q-item">
      <div class="custom-q-text">${q.q}<div class="custom-q-sys">${sysName}</div></div>
      <div class="custom-q-actions">
        <button class="btn-edit" onclick="editCustomQ(${q.id})">EDIT</button>
        <button class="btn-del"  onclick="deleteCustomQ(${q.id})">DELETE</button>
      </div>
    </div>`;
  });
  html += '</div></div>';
  el.innerHTML = html;
}

// ─── SCREEN HELPERS ───────────────────────────────────────────────────────
function hideAll() {
  ['home-screen','quiz-screen','finish-screen','addq-screen'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

// ─── QUIZ STATE ───────────────────────────────────────────────────────────
let sysIdx=0, questions=[], TOTAL=0, current=0, selected=null, confirmed=false, score=0, wrongIds=[], reviewMode=false, reviewIndex=0;

function startQuiz(idx) {
  sysIdx = idx;
  const custom = getCustomQuestions().filter(q => q._sysIdx === idx);
  const base   = applyOverrides(SYSTEMS[idx].questions, idx);
  questions = [...base, ...custom];
  TOTAL = questions.length;
  current=0; selected=null; confirmed=false; score=0; wrongIds=[]; reviewMode=false; reviewIndex=0;
  hideAll();
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}
function goHome() {
  hideAll();
  document.getElementById('home-screen').style.display = 'block';
  renderHomeCustomSection();
}
function restart() { startQuiz(sysIdx); }

function getQ() { return reviewMode ? questions[wrongIds[reviewIndex]] : questions[current]; }

function render() {
  const q     = getQ();
  const idx   = reviewMode ? reviewIndex : current;
  const total = reviewMode ? wrongIds.length : TOTAL;
  const pct   = Math.round((idx / total) * 100);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.background = reviewMode
    ? 'linear-gradient(90deg,#ff9800,#ffb74d)'
    : 'linear-gradient(90deg,#0077cc,#00c6ff)';
  document.getElementById('sys-label').textContent = reviewMode
    ? 'REVIEW · ' + (reviewIndex+1) + '/' + wrongIds.length
    : SYSTEMS[sysIdx].label + (q._custom ? ' ✎' : '');
  document.getElementById('q-counter').textContent = confirmed
    ? score + ' / ' + (reviewMode ? reviewIndex+1 : current+1)
    : (reviewMode ? reviewIndex+1 : current+1) + ' / ' + total;
  document.getElementById('q-num').textContent = (q._custom ? '★ CUSTOM' : 'Q' + String(q.id).padStart(2,'0'))
    + (reviewMode ? '  REVIEW' : '  ' + (current+1) + ' of ' + TOTAL);
  document.getElementById('q-text').textContent = q.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (confirmed) {
      if (i === q.correct)      btn.classList.add('correct');
      else if (i === selected)  btn.classList.add('wrong');
      else                      btn.classList.add('dimmed');
    } else if (i === selected) {
      btn.classList.add('selected');
    }
    btn.innerHTML = `<span class="opt-label">${LABELS[i]}</span><span>${opt}</span>`;
    if (!confirmed) btn.onclick = () => { selected = i; render(); };
    optDiv.appendChild(btn);
  });

  const expl = document.getElementById('explanation');
  const editBtn = document.getElementById('edit-q-btn');
  editBtn.style.display = 'block';
  if (confirmed) {
    expl.style.display = 'block';
    const isCorrect = selected === q.correct;
    const hdr = document.getElementById('expl-header');
    hdr.textContent = isCorrect ? '✓ CORRECT' : '✗ INCORRECT — correct answer: ' + LABELS[q.correct];
    hdr.style.color  = isCorrect ? '#00e5b0' : '#ff5c5c';
    // ── notes ──
    const ns = document.getElementById('notes-section');
    ns.style.display = 'block';
    const ta = document.getElementById('notes-ta');
    ta.value = loadNote(q);
    document.getElementById('notes-saved').style.opacity = '0';
  } else {
    expl.style.display = 'none';
    document.getElementById('notes-section').style.display = 'none';
  }

  const btn = document.getElementById('action-btn');
  btn.disabled = selected === null;
  if (!confirmed) {
    btn.textContent = 'CONFIRM';
  } else if (reviewMode) {
    btn.textContent = reviewIndex + 1 < wrongIds.length ? 'NEXT →' : 'FINISH';
  } else {
    btn.textContent = current + 1 < TOTAL ? 'NEXT →' : (wrongIds.length > 0 ? 'REVIEW MISSED →' : 'FINISH');
  }
}

function handleAction() {
  if (selected === null) return;
  if (!confirmed) {
    confirmed = true;
    const q = getQ();
    if (selected === q.correct) score++;
    else if (!reviewMode) wrongIds.push(current);
    render();
  } else {
    if (reviewMode) {
      if (reviewIndex + 1 < wrongIds.length) { reviewIndex++; }
      else { showFinish(); return; }
    } else {
      if (current + 1 < TOTAL) { current++; }
      else {
        if (wrongIds.length > 0) { reviewMode = true; reviewIndex = 0; }
        else { showFinish(); return; }
      }
    }
    selected = null; confirmed = false;
    render();
  }
}

function showFinish() {
  hideAll();
  document.getElementById('finish-screen').style.display = 'block';
  const pct    = Math.round((score / TOTAL) * 100);
  const passed = pct >= 75;
  document.getElementById('finish-sys').textContent    = SYSTEMS[sysIdx].label;
  document.getElementById('finish-total').textContent  = pct + '%';
  document.getElementById('finish-total').style.color  = passed ? '#00e5b0' : '#ff5c5c';
  document.getElementById('finish-detail').textContent = score + ' / ' + TOTAL + ' correct — ' + (passed ? 'SATISFACTORY' : 'NEEDS REVIEW');
  document.getElementById('finish-detail').style.color = passed ? '#00e5b0' : '#ff9800';
}

// ─── INIT ─────────────────────────────────────────────────────────────────
renderHomeCustomSection();

// ─── PWA SETUP ────────────────────────────────────────────────────────────
(function() {
  // ── Generate app icon via canvas ──
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const s = size;

    // Background
    ctx.fillStyle = '#0a1520';
    ctx.fillRect(0, 0, s, s);

    // Rounded rect border
    const r = s * 0.12;
    ctx.strokeStyle = '#0077cc';
    ctx.lineWidth = s * 0.045;
    ctx.beginPath();
    ctx.moveTo(r, s*0.06); ctx.lineTo(s-r, s*0.06);
    ctx.quadraticCurveTo(s-s*0.06, s*0.06, s-s*0.06, r+s*0.06);
    ctx.lineTo(s-s*0.06, s-r-s*0.06);
    ctx.quadraticCurveTo(s-s*0.06, s-s*0.06, s-r, s-s*0.06);
    ctx.lineTo(r, s-s*0.06);
    ctx.quadraticCurveTo(s*0.06, s-s*0.06, s*0.06, s-r-s*0.06);
    ctx.lineTo(s*0.06, r+s*0.06);
    ctx.quadraticCurveTo(s*0.06, s*0.06, r, s*0.06);
    ctx.closePath();
    ctx.stroke();

    // "A320" text
    ctx.fillStyle = '#e8f4ff';
    ctx.font = `bold ${s*0.28}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('A320', s/2, s*0.38);

    // Divider line
    ctx.strokeStyle = '#0077cc';
    ctx.lineWidth = s * 0.02;
    ctx.beginPath();
    ctx.moveTo(s*0.2, s*0.56); ctx.lineTo(s*0.8, s*0.56);
    ctx.stroke();

    // "QUIZ" text
    ctx.fillStyle = '#0077cc';
    ctx.font = `bold ${s*0.17}px monospace`;
    ctx.letterSpacing = '3px';
    ctx.fillText('QUIZ', s/2, s*0.72);

    return c.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  // ── Inject apple touch icon ──
  const appleIcon = document.createElement('link');
  appleIcon.rel  = 'apple-touch-icon';
  appleIcon.href = icon192;
  document.head.appendChild(appleIcon);

  // ── Create & inject manifest ──
  const manifest = {
    name: 'A320 Technical Quiz',
    short_name: 'A320 Quiz',
    description: 'A320 systems technical question bank — 878 questions across 18 systems',
    start_url: '.',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0a1520',
    theme_color: '#0077cc',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const mUrl  = URL.createObjectURL(mBlob);
  const mLink = document.createElement('link');
  mLink.rel  = 'manifest';
  mLink.href = mUrl;
  document.head.appendChild(mLink);

  // ── Register service worker for offline use ──
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'a320-quiz-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.href])));
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }))
  );
});`;
    const swBlob = new Blob([swCode], { type: 'text/javascript' });
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }
})();
</script>
